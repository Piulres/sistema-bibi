    post:
      tags: [Interno]
      summary: Cria uma assinatura recorrente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patientId, billingCycle, startDate, amount]
              properties:
                patientId: { type: string }
                companyId: { type: string, nullable: true }
                status:
                  type: string
                  enum: [ATIVA, SUSPENSA, CANCELADA]
                  default: ATIVA
                billingCycle:
                  type: string
                  enum: [MENSAL, TRIMESTRAL, SEMESTRAL, ANUAL]
                startDate: { type: string, format: date-time }
                endDate: { type: string, format: date-time, nullable: true }
                amount: { type: number, minimum: 0.01 }
                description: { type: string, nullable: true }
      responses:
        '200':
          description: Assinatura criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscription: { $ref: '#/components/schemas/SubscriptionView' }
        '400': { description: Dados inválidos }
        '404': { description: Beneficiário não encontrado }

