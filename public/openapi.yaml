    get:
      tags: [Interno]
      summary: Lista assinaturas recorrentes do tenant
      responses:
        '200':
          description: Assinaturas e beneficiários disponíveis para cadastro
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscriptions:
                    type: array
                    items: { $ref: '#/components/schemas/SubscriptionView' }
                  patients:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
