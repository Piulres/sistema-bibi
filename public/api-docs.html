<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sistema Bibi - ServiceOS v2.1 — API (Swagger UI)</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css"
    />
    <style>
      body { margin: 0; background: #fafafa; }
      .topbar { display: none; }
      header.bibi {
        background: linear-gradient(135deg, #1e293b, #f59e0b);
        color: #fff;
        padding: 16px 24px;
        font-family: system-ui, sans-serif;
      }
      header.bibi h1 { margin: 0; font-size: 18px; }
      header.bibi p { margin: 4px 0 0; font-size: 13px; color: #99f6e4; }
    </style>
  </head>
  <body>
    <header class="bibi">
      <h1>Sistema Bibi - ServiceOS v2.1 — Documentação da API</h1>
      <p>OpenAPI 3.0 · autenticação por cookie de sessão (faça login em /api/auth/login)</p>
    </header>
    <div id="swagger-ui"></div>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
    <script>
      window.onload = function () {
        window.ui = SwaggerUIBundle({
          url: "/openapi.yaml",
          dom_id: "#swagger-ui",
          deepLinking: true,
          withCredentials: true,
          presets: [SwaggerUIBundle.presets.apis],
          layout: "BaseLayout",
        });
      };
    </script>
  </body>
</html>
