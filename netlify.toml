# Sistema Bibi - ServiceOS — Netlify (Next.js 16 + Prisma/SQLite POC)
#
# Build local (sem publicar): npm run netlify:build
# Dev com emulacao Netlify:    npm run netlify:dev
# Publicar (manual):           npx netlify deploy --prod
# Validar pacote (sem deploy): npm run pre-release
# Operações:                   docs/plataforma/OPERACOES.md

[build]
  command = "node scripts/netlify-build.mjs"
  # O plugin Next.js exige publish != raiz do repo; .next e o distDir padrao.
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  # Garante devDependencies no npm ci (tailwind, tsx, typescript) quando NODE_ENV=production.
  NPM_FLAGS = "--include=dev"
  # Path relativo ao schema Prisma (prisma/schema.prisma) → demo.db gerado no build
  DATABASE_URL = "file:./dev.db"
  DUAL_DATA_STORE = "true"
  NETLIFY = "true"
  # SESSION_SECRET e CRON_SECRET: definir no painel Netlify (≥ 32 chars). Não commitar valores reais.
  ALLOW_DEMO_RESET = "false"

[[plugins]]
  package = "./netlify/plugins/patch-regional-blobs"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.production.environment]
  NODE_ENV = "production"
  NETLIFY = "true"
  ALLOW_DEMO_RESET = "false"

# Contexto de deploy para ambiente de OPERAÇÃO (Postgres — sem massa demo).
# Uso: npx netlify deploy --prod --build --context operation
# Requer DATABASE_URL=postgresql://... no painel Netlify.
[context.operation.environment]
  APP_MODE = "operation"
  RUN_SEED_ON_BUILD = "false"
  ALLOW_DEMO_RESET = "false"
  NODE_ENV = "production"
  NETLIFY = "true"

[context.deploy-preview.environment]
  NODE_ENV = "production"
  NETLIFY = "true"
  ALLOW_DEMO_RESET = "true"
[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  framework = "#custom"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Permitted-Cross-Domain-Policies = "none"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/api/branding/logo/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
