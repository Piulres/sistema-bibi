name: CI

on:
  push:
    branches: [main, dev, "cursor/**"]
  pull_request:
    branches: [main, dev]

# Prisma exige DATABASE_URL em todo comando que toca o schema.
# Dual-store: bootstrap gera demo.db + operation.db + espelho dev.db (db:verify).
env:
  DATABASE_URL: file:./dev.db
  SESSION_SECRET: ci-github-actions-session-secret-32chars-min
  CRON_SECRET: ci-cron-secret-32-characters-min
  SEED_SCALE: small
  ALLOW_DEMO_RESET: "true"

jobs:
  unit-integration-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Docs verify
        run: npm run docs:verify

      - name: Prepare database (dual-store)
        run: npm run db:bootstrap:demo

      - name: Database verify
        run: npm run db:verify

      - name: Unit + integration + API tests
        run: npm run test
        env:
          DATABASE_URL: file:./test.db

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: unit-integration-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare database (dual-store)
        run: npm run db:bootstrap:demo

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true
          PLAYWRIGHT_PORT: "3100"
